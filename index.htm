<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="style.css" rel="stylesheet">
</head>


<body>
    <div class="container">
        <h1>Registration Form</h1>
        <div class="form">
            <form>
                <div class="row">
                    <label>Name:</label>
                    <input type="text" placeholder="Username" id="name" onkeyup="validateform()">
                </div>
                <p id="nameError" style="color: red;"></p>
                <br>
                <div class="row">
                    <label>Email:</label>
                    <input type="text" placeholder="enter your email id" id="email" onkeyup="validateform()">
                </div>
                <p id="emailError" style="color: red;"></p>
                <br>
                <div class="row">
                    <label>Password:</label>
                    <input type="text" placeholder="enter your Password" id="password" onkeyup="validateform()">
                </div>
                <p id="passwordError" style="color: red;"></p>
                <br>
                <div class="btn">
                    <button id="submitBtn" disabled> Submit</button>
                </div>
            </form>


        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
